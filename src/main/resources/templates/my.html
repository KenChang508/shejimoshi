<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/nav :: head('我的课程')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav('my')}"></nav>

<div class="container mt-4">
    <h3 class="mb-3"><i class="bi bi-person-check"></i> 我的课程</h3>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small">选择学生</label>
                    <select id="studentNo" class="form-select form-select-sm" onchange="loadMyCourses()">
                        <option value="">请选择学生...</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary btn-sm" onclick="loadMyCourses()">
                        <i class="bi bi-search"></i> 查询
                    </button>
                    <a href="/select" class="btn btn-outline-success btn-sm">
                        <i class="bi bi-magic"></i> 去推荐课程
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 课程表格 -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><span id="myCourseTitle">我的选课列表</span></h5>
            <span id="myCreditTotal" class="badge bg-info"></span>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover" id="myCourseTable">
                    <thead class="table-light">
                        <tr>
                            <th>课程代码</th><th>课程名称</th><th>学分</th>
                            <th>类别</th><th>上课时间</th><th>地点</th>
                            <th>选课时间</th><th>状态</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="myCourseBody">
                        <tr id="emptyRow">
                            <td colspan="9" class="text-center text-muted py-4">
                                <i class="bi bi-inbox display-4 d-block mb-2"></i>请选择学生后查询
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer class="text-center text-muted py-4 mt-4">
    <small>智能选课系统 &copy; 2025</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    async function init() {
        // 加载学生列表
        const students = await api.get('/api/students');
        const sel = document.getElementById('studentNo');
        students.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.studentNo;
            opt.textContent = `${s.studentNo} - ${s.name} (${s.major})`;
            sel.appendChild(opt);
        });

        // 检查 URL 参数
        const params = new URLSearchParams(window.location.search);
        if (params.get('studentNo')) {
            sel.value = params.get('studentNo');
            loadMyCourses();
        }
    }
    init();

    async function loadMyCourses() {
        const studentNo = document.getElementById('studentNo').value;
        const tbody = document.getElementById('myCourseBody');
        if (!studentNo) { tbody.innerHTML = '<tr id="emptyRow"><td colspan="9" class="text-center text-muted py-4">请选择学生</td></tr>'; return; }

        try {
            const selections = await api.get('/api/selection/list?studentNo=' + studentNo);
            const student = await api.get('/api/students/' + studentNo);
            document.getElementById('myCourseTitle').textContent = `${student.name} 的选课列表`;

            tbody.innerHTML = '';
            if (!selections || selections.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted py-4">
                    <i class="bi bi-journal-x display-4 d-block mb-2"></i>暂未选课，<a href="/select?studentNo=${studentNo}">去推荐课程</a></td></tr>`;
                document.getElementById('myCreditTotal').textContent = '';
                return;
            }

            let totalCredits = 0;
            selections.forEach(s => {
                if (s.status === 'SELECTED') totalCredits += (s.credits || 0);
                const statusBadge = s.status === 'SELECTED'
                    ? '<span class="badge bg-success">已选</span>'
                    : s.status === 'DROPPED'
                        ? '<span class="badge bg-secondary">已退选</span>'
                        : '<span class="badge bg-info">已完成</span>';

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${s.courseCode}</td>
                    <td>${s.courseName}</td>
                    <td>${s.credits}</td>
                    <td>${s.category||''}</td>
                    <td>${s.schedule||'-'}</td>
                    <td>${s.location||'-'}</td>
                    <td class="small">${s.selectionTime ? s.selectionTime.substring(0,10) : ''}</td>
                    <td>${statusBadge}</td>
                    <td>${s.status === 'SELECTED'
                        ? `<button class="btn btn-sm btn-outline-danger" onclick="dropCourse('${studentNo}','${s.courseCode}')">退选</button>`
                        : ''}</td>`;
                tbody.appendChild(row);
            });
            document.getElementById('myCreditTotal').textContent = totalCredits + ' 学分';

        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="9" class="text-center text-danger py-4">加载失败：${e.message}</td></tr>`;
        }
    }

    async function dropCourse(studentNo, courseCode) {
        if (!confirm(`确定要退选 ${courseCode} 吗？`)) return;
        try {
            await api.post(`/api/selection/drop?studentNo=${studentNo}&courseCode=${courseCode}`);
            loadMyCourses();
        } catch(e) {
            alert('退选失败：' + e.message);
        }
    }
</script>
</body>
</html>
