<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">智能选课系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav th:fragment="nav(current)" class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-mortarboard-fill"></i> 智能选课系统
        </a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${current == 'index' ? 'active' : ''}"
                       href="/"><i class="bi bi-house"></i> 首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${current == 'courses' ? 'active' : ''}"
                       href="/courses"><i class="bi bi-book"></i> 课程浏览</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${current == 'select' ? 'active' : ''}"
                       href="/select"><i class="bi bi-magic"></i> 智能选课</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${current == 'agent' ? 'active' : ''}"
                       href="/agent"><i class="bi bi-robot"></i> AI 助手</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${current == 'my' ? 'active' : ''}"
                       href="/my"><i class="bi bi-person-check"></i> 我的课程</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
