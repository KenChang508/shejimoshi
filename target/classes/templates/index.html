<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/nav :: head('智能选课系统 - 首页')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav('index')}"></nav>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card bg-gradient-primary text-white shadow">
                <div class="card-body p-4">
                    <h2 class="fw-bold"><i class="bi bi-robot"></i> 欢迎使用智能选课系统</h2>
                    <p class="mb-0 opacity-90">基于 DeepSeek AI 的个性化课程推荐，让你的选课更科学、更高效</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body text-center">
                    <i class="bi bi-book display-4 text-primary"></i>
                    <h5 class="mt-2">课程浏览</h5>
                    <p class="text-muted small">查看所有可选课程信息，按学期和类别筛选</p>
                    <a href="/courses" class="btn btn-outline-primary btn-sm">进入浏览</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body text-center">
                    <i class="bi bi-magic display-4 text-success"></i>
                    <h5 class="mt-2">AI 智能推荐</h5>
                    <p class="text-muted small">输入学号，AI 根据专业、兴趣、已修课程智能推荐</p>
                    <a href="/select" class="btn btn-outline-success btn-sm">开始推荐</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body text-center">
                    <i class="bi bi-robot display-4 text-warning"></i>
                    <h5 class="mt-2">AI 助手</h5>
                    <p class="text-muted small">与智能体对话，让 AI 帮你完成选课</p>
                    <a href="/agent" class="btn btn-outline-warning btn-sm">开始对话</a>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body text-center">
                    <i class="bi bi-person-check display-4 text-info"></i>
                    <h5 class="mt-2">我的课程</h5>
                    <p class="text-muted small">查看已选课程，管理选课（选课/退选）</p>
                    <a href="/my" class="btn btn-outline-info btn-sm">查看课程</a>
                </div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white">
            <h5 class="mb-0"><i class="bi bi-people"></i> 学生列表</h5>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>学号</th><th>姓名</th><th>专业</th>
                            <th>年级</th><th>GPA</th><th>兴趣方向</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${students}">
                            <td th:text="${s.studentNo}"></td>
                            <td th:text="${s.name}"></td>
                            <td th:text="${s.major}"></td>
                            <td th:text="${s.grade}"></td>
                            <td th:text="${s.gpa}"></td>
                            <td th:text="${s.interests}"></td>
                            <td>
                                <a th:href="@{/select(studentNo=${s.studentNo})}" class="btn btn-sm btn-success">推荐课程</a>
                                <a th:href="@{/my(studentNo=${s.studentNo})}" class="btn btn-sm btn-outline-primary">已选课程</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer class="text-center text-muted py-4 mt-4">
    <small>智能选课系统 &copy; 2025 · Powered by DeepSeek AI</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
