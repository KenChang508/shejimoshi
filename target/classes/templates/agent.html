<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/nav :: head('智能体对话')}"></head>
<body>
<nav th:replace="~{fragments/nav :: nav('agent')}"></nav>

<div class="container mt-4">
    <div class="row g-4">
        <!-- 左侧：对话面板 -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-robot"></i> 智能选课助手</h5>
                    <span id="elapsedBadge" class="badge bg-light text-dark d-none"></span>
                </div>
                <div class="card-body d-flex flex-column" style="height: 65vh;">
                    <!-- 消息区 -->
                    <div id="chatMessages" class="flex-grow-1 overflow-auto mb-3" style="max-height: 55vh;">
                        <div class="text-center text-muted py-5" id="chatWelcome">
                            <i class="bi bi-chat-dots display-3 d-block mb-2"></i>
                            <p class="mb-1">你好！我是智能选课助手</p>
                            <p class="small">我可以帮你查询课程、检查学分、推荐课程、执行选课和退选</p>
                            <div class="mt-3">
                                <span class="text-muted small">试试这些：</span><br>
                                <button class="btn btn-sm btn-outline-secondary m-1" onclick="quickSend('帮我推荐3门AI方向的课')">推荐AI课程</button>
                                <button class="btn btn-sm btn-outline-secondary m-1" onclick="quickSend('我还有多少学分可以用')">查学分</button>
                                <button class="btn btn-sm btn-outline-secondary m-1" onclick="quickSend('帮我选操作系统')">选操作系统</button>
                            </div>
                        </div>
                    </div>
                    <!-- 输入区 -->
                    <div class="input-group">
                        <input type="text" id="userInput" class="form-control" 
                               placeholder="输入你想做什么..." 
                               onkeydown="if(event.key==='Enter') sendMessage()">
                        <button class="btn btn-success" onclick="sendMessage()">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧：学生选择 + 说明 -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-header bg-light">
                    <i class="bi bi-person-circle"></i> 当前学生
                </div>
                <div class="card-body">
                    <select id="studentNo" class="form-select form-select-sm" onchange="onStudentChange()">
                        <option value="">请选择学生...</option>
                        <option th:each="s : ${students}"
                                th:value="${s.studentNo}"
                                th:text="${s.studentNo + ' - ' + s.name + ' (' + s.major + ')'}"></option>
                    </select>
                </div>
            </div>
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-header bg-light">
                    <i class="bi bi-tools"></i> 可用操作
                </div>
                <div class="card-body">
                    <div class="d-grid gap-2">
                        <button class="btn btn-sm btn-outline-primary" onclick="quickSend('帮我推荐5门课')">
                            <i class="bi bi-stars"></i> AI 课程推荐
                        </button>
                        <button class="btn btn-sm btn-outline-info" onclick="quickSend('查看我的学分状态')">
                            <i class="bi bi-pie-chart"></i> 学分检查
                        </button>
                        <button class="btn btn-sm btn-outline-success" onclick="quickSend('显示所有可选课程')">
                            <i class="bi bi-list-ul"></i> 浏览课程
                        </button>
                    </div>
                </div>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-light">
                    <i class="bi bi-info-circle"></i> 说明
                </div>
                <div class="card-body small text-muted">
                    <p>智能体能自主完成：</p>
                    <ul class="mb-0 ps-3">
                        <li>查询课程信息和余额</li>
                        <li>检查学分状态和先修课</li>
                        <li>AI 个性化课程推荐</li>
                        <li>批量或单个选课/退选</li>
                        <li>分析选课方案优劣</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="text-center text-muted py-4 mt-4">
    <small>智能选课系统 &copy; 2025 · Powered by DeepSeek AI Agent</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    let sessionId = null;

    function onStudentChange() {
        sessionId = null;
        const welcome = document.getElementById('chatWelcome');
        if (welcome) welcome.classList.remove('d-none');
        const msgs = document.getElementById('chatMessages');
        // 清除旧消息
        msgs.querySelectorAll('.chat-msg').forEach(m => m.remove());
    }

    function quickSend(text) {
        document.getElementById('userInput').value = text;
        sendMessage();
    }

    async function sendMessage() {
        const studentNo = document.getElementById('studentNo').value;
        const message = document.getElementById('userInput').value.trim();

        if (!studentNo) { alert('请先选择学生'); return; }
        if (!message) return;

        const input = document.getElementById('userInput');
        input.value = '';
        input.disabled = true;

        // 隐藏欢迎信息
        const welcome = document.getElementById('chatWelcome');
        if (welcome) welcome.classList.add('d-none');

        // 添加用户消息
        addMessage('user', message);

        // 加载中
        const loadingId = addMessage('assistant', '<span class="text-muted"><div class="spinner-border spinner-border-sm me-2"></div>思考中...</span>', true);

        const badge = document.getElementById('elapsedBadge');
        badge.classList.remove('d-none');

        try {
            const res = await api.post('/api/agent/chat', {
                studentNo: studentNo,
                message: message,
                sessionId: sessionId
            });

            sessionId = res.sessionId;

            // 移除加载消息
            document.getElementById(loadingId)?.remove();

            // 添加工具调用状态
            if (res.toolCalls && res.toolCalls.length > 0) {
                res.toolCalls.forEach(tc => {
                    const icon = tc.success ? '✅' : '⚠️';
                    addMessage('tool', `${icon} ${tc.summary}`);
                });
            }

            // 添加 AI 回复
            addMessage('assistant', res.reply.replace(/\n/g, '<br>'));

            // 耗时
            const sec = (res.elapsedMs / 1000).toFixed(1);
            badge.textContent = sec + 's';
            setTimeout(() => badge.classList.add('d-none'), 3000);

        } catch (e) {
            document.getElementById(loadingId)?.remove();
            addMessage('assistant', '<span class="text-danger">❌ ' + e.message + '</span>');
            badge.classList.add('d-none');
        }

        input.disabled = false;
        input.focus();

        // 滚动到底部
        const msgs = document.getElementById('chatMessages');
        msgs.scrollTop = msgs.scrollHeight;
    }

    function addMessage(role, content, isTemp) {
        const container = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.className = 'chat-msg mb-2 ' + (role === 'user' ? 'text-end' : 'text-start');

        const align = role === 'user' ? 'float-end text-end' : '';
        const bg = role === 'user' ? 'bg-primary text-white' 
                : role === 'tool' ? 'bg-light text-muted border'
                : 'bg-white border';

        const icon = role === 'user' ? '👤' : role === 'tool' ? '' : '🤖';

        div.innerHTML = `
            <div class="d-inline-block ${bg} rounded-3 px-3 py-2 shadow-sm" 
                 style="max-width: 85%; word-wrap: break-word;">
                ${icon ? '<small class="d-block text-muted">' + icon + '</small>' : ''}
                <span class="small">${content}</span>
            </div>`;

        if (isTemp) div.id = 'temp-loading';
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div.id;
    }
</script>
</body>
</html>
