server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: course-selection-system

  thymeleaf:
    encoding: UTF-8

  datasource:
    url: jdbc:h2:file:./data/coursedb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

# ============================================================
# DeepSeek AI 配置
# 通过环境变量 DEEPSEEK_API_KEY 注入，或直接替换默认值
# ============================================================
deepseek:
  api:
    key: ${DEEPSEEK_API_KEY:your-api-key-here}
    base-url: https://api.deepseek.com
    model: deepseek-chat
    max-tokens: 2000
    temperature: 0.7
